name: Rebuild APT Repository

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install APT metadata tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev gnupg

      - name: Rebuild APT metadata
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
        run: ./scripts/rebuild-apt-repo.sh

      - name: Validate APT repository
        run: ./scripts/validate-apt-repo.sh

      - name: Commit rebuilt metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apt/dists apt/gpg.key
          git diff --cached --quiet || git commit -m "Rebuild APT repository metadata"
          git push